<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เลือกบริการ - PrettyQueue Studio</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Services Page Styles */
        .services-page {
            min-height: 100vh;
            background: #f8f9fa;
            padding: 20px;
            font-family: 'Inter', sans-serif;
        }

        .services-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .back-btn {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 8px 16px;
            color: #333;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .back-btn:hover {
            background: #f5f5f5;
        }

        .page-title {
            font-size: 24px;
            font-weight: 700;
            color: #1a1a1a;
            text-align: center;
            flex: 1;
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            max-width: 400px;
            margin: 0 auto;
        }

        .service-card {
            background: #ffd4e5;
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .service-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 105, 180, 0.3);
        }

        .service-card:active {
            transform: scale(0.98);
        }

        .service-image {
            width: 100%;
            height: 80px;
            background: #f0f0f0;
            border-radius: 8px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #666;
            position: relative;
            overflow: hidden;
        }

        .service-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 8px;
        }

        .service-text {
            font-size: 12px;
            font-weight: 600;
            color: #1a1a1a;
            line-height: 1.3;
            margin-bottom: 4px;
        }

        .service-price {
            font-size: 11px;
            font-weight: 500;
            color: #666;
        }

        /* Specific service cards */
        .service-card:nth-child(1) .service-image {
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
        }

        .service-card:nth-child(2) .service-image {
            background: linear-gradient(135deg, #e8f4fd 0%, #d1e7dd 100%);
        }

        .service-card:nth-child(3) .service-image {
            background: linear-gradient(135deg, #ff6b6b 0%, #ff8e8e 100%);
        }

        .service-card:nth-child(4) .service-image {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
        }

        .service-card:nth-child(5) .service-image {
            background: linear-gradient(135deg, #ffc107 0%, #ffeb3b 100%);
        }

        .service-card:nth-child(6) .service-image {
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
        }

        /* Responsive Design */
        @media (max-width: 480px) {
            .services-page {
                padding: 15px;
            }

            .services-grid {
                gap: 12px;
            }

            .service-card {
                padding: 12px;
            }

            .service-image {
                height: 60px;
            }

            .service-text {
                font-size: 11px;
            }

            .service-price {
                font-size: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="services-page">
        <!-- Header -->
        <div class="services-header">
            <button class="back-btn" onclick="goBack()">
                <i class="fas fa-arrow-left"></i>
                กลับ
            </button>
            <h1 class="page-title">เลือกบริการ</h1>
            <div></div> <!-- Spacer for centering -->
        </div>

        <!-- Services Grid -->
        <div class="services-grid">
            <!-- Service 1: Toe nail polish -->
            <div class="service-card" onclick="selectService('Toe nail polish', '฿1,800')">
                <div class="service-image">
                    <i class="fas fa-hand-paper"></i>
                </div>
                <div class="service-text">Toe nail polish</div>
                <div class="service-price">฿1,800</div>
                <div class="service-text">Gel Pedicure</div>
                <div class="service-price">฿1,500</div>
            </div>

            <!-- Service 2: Basic pedicure -->
            <div class="service-card" onclick="selectService('Basic pedicure', '฿500')">
                <div class="service-image">
                    <i class="fas fa-shoe-prints"></i>
                </div>
                <div class="service-text">Basic pedicure</div>
                <div class="service-price">฿500</div>
            </div>

            <!-- Service 3: Gel Manicure & Pedicure -->
            <div class="service-card" onclick="selectService('Gel Manicure', '฿800')">
                <div class="service-image">
                    <i class="fas fa-palette"></i>
                </div>
                <div class="service-text">Gel Manicure</div>
                <div class="service-price">฿800</div>
                <div class="service-text">Gel Pedicure</div>
                <div class="service-price">฿800</div>
            </div>

            <!-- Service 4: Gel Pedicure & Art -->
            <div class="service-card" onclick="selectService('Gel Pedicure', '฿800')">
                <div class="service-image">
                    <i class="fas fa-paint-brush"></i>
                </div>
                <div class="service-text">Gel Pedicure</div>
                <div class="service-price">฿800</div>
                <div class="service-text">Art Pedicure</div>
                <div class="service-price">฿1,500</div>
            </div>

            <!-- Service 5: Gel polish & Nail art -->
            <div class="service-card" onclick="selectService('Gel polish', '฿800')">
                <div class="service-image">
                    <i class="fas fa-gem"></i>
                </div>
                <div class="service-text">Gel polish</div>
                <div class="service-price">฿800</div>
                <div class="service-text">Nail art</div>
                <div class="service-price">1,000 - 2,200</div>
                <div class="service-text">Nail extensions</div>
                <div class="service-price">฿200</div>
            </div>

            <!-- Service 6: Basic Manicure -->
            <div class="service-card" onclick="selectService('Basic Manicure', '฿500')">
                <div class="service-image">
                    <i class="fas fa-hand-holding"></i>
                </div>
                <div class="service-text">Basic Manicure</div>
                <div class="service-price">฿500</div>
            </div>
        </div>
    </div>

    <script>
        function goBack() {
            // Go back to main page
            window.location.href = 'index.html';
        }

        function selectService(serviceName, price) {
            // Add visual feedback
            showNotification(`เลือกบริการ: ${serviceName} - ${price}`, 'success');
            
            // Navigate to booking page
            setTimeout(() => {
                window.location.href = 'booking.html';
            }, 1000);
        }

        // Show notification
        function showNotification(message, type = 'info') {
            const existingNotifications = document.querySelectorAll('.notification-toast');
            existingNotifications.forEach(notification => notification.remove());
            
            const notification = document.createElement('div');
            notification.className = `notification-toast notification-${type}`;
            notification.innerHTML = `
                <div class="notification-content">
                    <i class="fas fa-${getNotificationIcon(type)}"></i>
                    <span>${message}</span>
                </div>
            `;
            
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                background: ${getNotificationColor(type)};
                color: white;
                padding: 15px 20px;
                border-radius: 12px;
                box-shadow: 0 5px 15px rgba(0,0,0,0.2);
                z-index: 10000;
                display: flex;
                align-items: center;
                gap: 15px;
                max-width: 300px;
                animation: slideInRight 0.3s ease-out;
            `;
            
            document.body.appendChild(notification);
            
            setTimeout(() => {
                if (notification.parentNode) {
                    notification.style.animation = 'slideOutRight 0.3s ease-out';
                    setTimeout(() => notification.remove(), 300);
                }
            }, 3000);
        }

        function getNotificationIcon(type) {
            const icons = {
                'success': 'check-circle',
                'error': 'exclamation-circle',
                'warning': 'exclamation-triangle',
                'info': 'info-circle'
            };
            return icons[type] || 'info-circle';
        }

        function getNotificationColor(type) {
            const colors = {
                'success': '#10b981',
                'error': '#ef4444',
                'warning': '#f59e0b',
                'info': '#3b82f6'
            };
            return colors[type] || '#3b82f6';
        }

        // Add CSS animations
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideInRight {
                from {
                    transform: translateX(100%);
                    opacity: 0;
                }
                to {
                    transform: translateX(0);
                    opacity: 1;
                }
            }
            
            @keyframes slideOutRight {
                from {
                    transform: translateX(0);
                    opacity: 1;
                }
                to {
                    transform: translateX(100%);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
