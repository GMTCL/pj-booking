<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Special Nail Packages - PrettyQueue Studio</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Special Nail Packages Page Styles */
        .nail-packages-page {
            min-height: 100vh;
            background: url('./Screenshot 2025-10-17 184454.png') center/cover no-repeat;
            position: relative;
            overflow: hidden;
        }

        .nail-packages-header {
            position: relative;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            padding: 20px;
            color: white;
        }

        .header-top {
            display: flex;
            justify-content: flex-start;
            align-items: flex-start;
        }

        .back-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 8px;
            padding: 8px 16px;
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        /* Removed all content sections - only background image remains */

        /* Remove hand overlay since we're using the actual image as background */

        /* Responsive Design */
        @media (max-width: 480px) {
            .nail-packages-header {
                padding: 20px 15px;
            }
        }
    </style>
</head>
<body>
    <div class="nail-packages-page" onclick="goToServices()">
        <div class="nail-packages-header">
            <!-- Header Top -->
            <div class="header-top">
                <button class="back-btn" onclick="goBack()">
                    <i class="fas fa-arrow-left"></i> กลับ
                </button>
            </div>
        </div>
    </div>

    <script>
        function goBack() {
            // Go back to main page
            window.location.href = 'index.html';
        }

        function goToServices() {
            window.location.href = 'services.html';
        }
    </script>
</body>
</html>
