<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrettyQueue Studio</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- Header Bar -->
    <div class="header-bar">
        <span class="app-name">Betask Linked</span>
        <span class="app-subtitle">betask-lind.web.app</span>
        <div class="header-icons">
            <button class="icon-btn">
                <i class="far fa-clone"></i>
            </button>
            <button class="icon-btn">
                <i class="fas fa-times"></i>
            </button>
        </div>
    </div>

    <!-- Main Container -->
    <div class="app-container">
        <!-- Background Image Section -->
        <div class="background-section">
            <div class="eye-image"></div>
        </div>
        
        <!-- Main Content Card -->
        <div class="main-card">
            <!-- Logo Section -->
            <div class="logo-section">
                <div class="logo-circle">
                    <div class="logo-text">
                        <span class="logo-p">P</span>
                        <span class="logo-q">q</span>
                    </div>
                </div>
            </div>
            
            <!-- Title Section -->
            <div class="title-section">
                <h1 class="main-title">Promotion</h1>
                <p class="studio-name">PrettyQueue Studio</p>
            </div>
            
            <!-- Service Categories Section -->
            <div class="service-section">
                <h3 class="service-label">ประเภทบริการ</h3>
                
                <div class="service-cards">
                    <!-- Manicure Service -->
                    <div class="service-item">
                        <div class="service-card manicure-card">
                            <div class="service-icon">
                                <img src="./Rectangle 305.png" alt="Manicure Icon" class="manicure-icon">
                            </div>
                        </div>
                        <span class="service-name">ทำเล็บ</span>
                    </div>
                    
                    <!-- Eyelash Service -->
                    <div class="service-item">
                        <div class="service-card eyelash-card">
                            <div class="service-icon">
                                <i class="fas fa-eye"></i>
                            </div>
                        </div>
                        <span class="service-name">ต่อขนตา</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
